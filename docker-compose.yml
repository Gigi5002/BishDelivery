version: '3.8'

services:
  # Основная база данных с поддержкой гео-запросов (PostGIS)
  postgres:
    image: postgis/postgis:15-3.3
    container_name: bishdelivery_postgres
    environment:
      POSTGRES_USER: bish_user
      POSTGRES_PASSWORD: bish_password
      POSTGRES_DB: bishdelivery_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Кэш, сессии, брокер для Celery
  redis:
    image: redis:7.0-alpine
    container_name: bishdelivery_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Брокер сообщений Kafka (вместе с Zookeeper)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: bishdelivery_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: bishdelivery_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  postgres_data:
  redis_data: